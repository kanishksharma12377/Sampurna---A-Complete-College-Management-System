<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Sampurna ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        maroon: { DEFAULT:'#800000', dark:'#5c0000', light:'#a03030' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <!-- Minimal Header -->
    <header class="bg-white/80 backdrop-blur border-b border-gray-200 sticky top-0 z-10">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 group">
                <img src="images/image2.png" alt="Logo" class="w-8 h-8 object-contain" />
                <span class="text-lg font-bold text-maroon group-hover:opacity-80 transition">Sampurna ERP</span>
            </a>
            <a href="index.html" class="text-sm text-gray-500 hover:text-maroon transition"><i class="fa-solid fa-arrow-left mr-1"></i>Back to Home</a>
        </div>
    </header>

    <!-- Login Card -->
    <main class="flex-1 flex items-center justify-center p-4">
        <div class="w-full max-w-md animate-fade-in">
            <!-- Card -->
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
                <!-- Maroon stripe -->
                <div class="h-2 bg-gradient-to-r from-maroon to-maroon-dark"></div>
                <div class="p-8">
                    <div class="text-center mb-6">
                        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-red-50 mb-3">
                            <i class="fa-solid fa-graduation-cap text-2xl text-maroon"></i>
                        </div>
                        <h2 class="text-2xl font-bold text-gray-800">Welcome Back</h2>
                        <p class="text-gray-500 text-sm mt-1">Sign in to your Sampurna ERP account</p>
                    </div>

                    <!-- Role Tabs -->
                    <div class="flex rounded-lg bg-gray-100 p-1 mb-6" id="roleTabs">
                        <button type="button" data-role="admin" class="role-tab flex-1 py-2 text-sm font-semibold rounded-md transition-all text-gray-500">
                            <i class="fa-solid fa-shield-halved mr-1"></i>Admin
                        </button>
                        <button type="button" data-role="student" class="role-tab flex-1 py-2 text-sm font-semibold rounded-md transition-all text-gray-500">
                            <i class="fa-solid fa-user-graduate mr-1"></i>Student
                        </button>
                    </div>

                    <form id="loginForm" class="space-y-4" onsubmit="event.preventDefault(); goLogin();">
                        <!-- Admin Fields -->
                        <div id="adminFields" class="hidden space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                                <div class="relative">
                                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400"><i class="fa-solid fa-user text-sm"></i></span>
                                    <input type="text" id="adminUsername" class="w-full pl-10 pr-4 py-2.5 border-2 border-gray-200 rounded-lg text-sm focus:border-maroon transition" placeholder="Enter admin username" autocomplete="username" />
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                                <div class="relative">
                                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400"><i class="fa-solid fa-lock text-sm"></i></span>
                                    <input type="password" id="adminPassword" class="w-full pl-10 pr-10 py-2.5 border-2 border-gray-200 rounded-lg text-sm focus:border-maroon transition" placeholder="Enter password" autocomplete="current-password" />
                                    <button type="button" onclick="togglePw(this)" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600"><i class="fa-solid fa-eye text-sm"></i></button>
                                </div>
                            </div>
                        </div>

                        <!-- Student Fields -->
                        <div id="studentFields" class="hidden space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Admission ID</label>
                                <div class="relative">
                                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400"><i class="fa-solid fa-id-card text-sm"></i></span>
                                    <input type="text" id="studentIdLogin" class="w-full pl-10 pr-4 py-2.5 border-2 border-gray-200 rounded-lg text-sm focus:border-maroon transition" placeholder="e.g. SMPRNA-0001-ABCD" />
                                </div>
                                <p class="text-xs text-gray-400 mt-1"><i class="fa-solid fa-circle-info mr-1"></i>Your admission ID was provided by the administrator.</p>
                            </div>
                        </div>

                        <!-- Placeholder when no role selected -->
                        <div id="noRole" class="text-center py-6 text-gray-400">
                            <i class="fa-solid fa-arrow-up text-lg mb-2 block"></i>
                            <p class="text-sm">Select your role above to continue</p>
                        </div>

                        <!-- Error -->
                        <div id="loginError" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg p-3 flex items-center gap-2">
                            <i class="fa-solid fa-circle-exclamation"></i>
                            <span id="loginErrorText"></span>
                        </div>

                        <!-- Submit -->
                        <button id="loginBtn" type="submit" class="hidden w-full bg-maroon hover:bg-maroon-dark text-white font-semibold py-2.5 rounded-lg transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                            <span id="loginBtnText">Sign In</span>
                            <span id="loginBtnSpinner" class="hidden"><i class="fa-solid fa-spinner fa-spin ml-1"></i></span>
                        </button>
                    </form>
                </div>
            </div>
            <!-- Footer note -->
            <p class="text-center text-xs text-gray-400 mt-4">&copy; 2025 Sampurna College of Engineering. All rights reserved.</p>
        </div>
    </main>

    <script>
        // ── Role Tab switching ──
        const tabs = document.querySelectorAll('.role-tab');
        const adminFields = document.getElementById('adminFields');
        const studentFields = document.getElementById('studentFields');
        const noRole = document.getElementById('noRole');
        const loginBtn = document.getElementById('loginBtn');
        let selectedRole = '';

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                selectedRole = tab.dataset.role;
                tabs.forEach(t => { t.classList.remove('bg-white','text-maroon','shadow-sm'); t.classList.add('text-gray-500'); });
                tab.classList.add('bg-white','text-maroon','shadow-sm');
                tab.classList.remove('text-gray-500');
                hideError();
                noRole.classList.add('hidden');
                loginBtn.classList.remove('hidden');
                if (selectedRole === 'admin') {
                    adminFields.classList.remove('hidden');
                    studentFields.classList.add('hidden');
                    document.getElementById('adminUsername').focus();
                } else {
                    adminFields.classList.add('hidden');
                    studentFields.classList.remove('hidden');
                    document.getElementById('studentIdLogin').focus();
                }
            });
        });

        // Hash preselect
        const hash = (location.hash || '').replace('#','');
        if (hash === 'admin' || hash === 'student') {
            document.querySelector(`.role-tab[data-role="${hash}"]`).click();
        }

        // ── Toggle password visibility ──
        function togglePw(btn) {
            const input = btn.parentElement.querySelector('input');
            const icon = btn.querySelector('i');
            if (input.type === 'password') { input.type = 'text'; icon.classList.replace('fa-eye','fa-eye-slash'); }
            else { input.type = 'password'; icon.classList.replace('fa-eye-slash','fa-eye'); }
        }

        // ── Error helpers ──
        function showError(msg) {
            document.getElementById('loginErrorText').textContent = msg;
            document.getElementById('loginError').classList.remove('hidden');
        }
        function hideError() { document.getElementById('loginError').classList.add('hidden'); }

        // ── Login ──
        function goLogin() {
            hideError();
            if (!selectedRole) { showError('Please select a role first.'); return; }

            const btnText = document.getElementById('loginBtnText');
            const btnSpinner = document.getElementById('loginBtnSpinner');
            const loginBtnEl = document.getElementById('loginBtn');
            loginBtnEl.disabled = true;
            btnText.textContent = 'Signing in…';
            btnSpinner.classList.remove('hidden');

            let username = '', password = '';
            if (selectedRole === 'admin') {
                username = document.getElementById('adminUsername').value.trim();
                password = document.getElementById('adminPassword').value.trim();
                if (!username || !password) { resetBtn(); showError('Please enter username and password.'); return; }
            } else {
                username = document.getElementById('studentIdLogin').value.trim();
                password = 'student123';
                if (!username) { resetBtn(); showError('Please enter your Admission ID.'); return; }
            }

            fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success && data.role === selectedRole) {
                    sessionStorage.setItem('user', JSON.stringify({ username: data.username || username, role: data.role }));
                    window.location.href = selectedRole === 'admin' ? 'admin-panel.html' : 'student-panel.html';
                } else {
                    resetBtn();
                    showError(selectedRole === 'admin' ? 'Invalid admin credentials.' : 'Invalid Admission ID.');
                }
            })
            .catch(() => { resetBtn(); showError('Server error. Is the server running?'); });
        }

        function resetBtn() {
            const el = document.getElementById('loginBtn');
            el.disabled = false;
            document.getElementById('loginBtnText').textContent = 'Sign In';
            document.getElementById('loginBtnSpinner').classList.add('hidden');
        }
    </script>
</body>
</html>
